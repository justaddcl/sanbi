name: Chromatic

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chromatic:
    name: Publish Storybook
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.1.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish Storybook to Chromatic
        uses: chromaui/action@v17
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          branchName: ${{ github.event.pull_request.head.ref || github.ref_name }}
          chromaticSha: ${{ github.event.pull_request.head.sha || github.sha }}
          repositorySlug: ${{ github.repository }}
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: false
          autoAcceptChanges: main
